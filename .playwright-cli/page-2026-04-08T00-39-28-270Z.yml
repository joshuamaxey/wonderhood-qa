              - paragraph [ref=e107]: Learning outside traditional classrooms can be empowering, but it can also feel isolating, especially in rural communities where it can be harder to meet peers regularly.
              - paragraph [ref=e108]: Our events give learners a place to belong. Families can choose the opportunities that excite them most. Through outdoor adventures, creative arts, STEAM exploration, and community projects, students build friendships, explore interests, and grow in confidence.
